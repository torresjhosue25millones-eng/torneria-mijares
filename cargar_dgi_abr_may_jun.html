function log(msg,cls=''){const d=document.getElementById('log');d.innerHTML+=`<div class="${cls}">${msg}</div>`;d.scrollTop=d.scrollHeight;}

async function postReg(reg){
  const prov=reg.concepto.replace(/^Factura (a|de): /,'');
  const fila=[reg.id,reg.tipo,reg.concepto,reg.monto,reg.cat,prov,reg.fecha,reg.estado];
  const r=await fetch(API,{
    method:'POST',
    body:JSON.stringify({accion:'guardar',tabla:'movimientos',fila:fila,dato:reg})
  });
  const j=await r.json();
  if(j.ok) return true;
  throw new Error(j.error||'Error');
}

async function cargar(){
  document.getElementById('btn').disabled=true;
  log('Iniciando carga de 35 registros DGI...','info');
  log('─'.repeat(55));
  let ok=0,err=0;
  for(const reg of REGISTROS){
    try{
      await postReg(reg);
      log(`✓ ${reg.fecha} | ${reg.tipo==='ingreso'?'INGRESO':'EGRESO'} | $${reg.monto} | ${reg.concepto.substring(0,45)}...`,'ok');
      ok++;
    }catch(e){
      log(`✗ ${reg.fecha} | $${reg.monto} | ${e.message}`,'err');
      err++;
    }
    await new Promise(r=>setTimeout(r,300));
  }
  log('─'.repeat(55));
  log(`Carga completa: ${ok} cargados · ${err} errores`,'info');
  const res=document.getElementById('resumen');
  res.style.display='block';
  res.innerHTML=`<strong>Resumen:</strong><br>Abril: 6 ing ($1,939) + 7 egr ($197.60)<br>Mayo: 4 ing ($1,405) + 10 egr ($253.31)<br>Junio: 4 ing ($1,355) + 4 egr ($161.49)<br><strong>Total: ${ok} registros agregados</strong>`;

}
